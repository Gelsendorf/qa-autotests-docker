version: "3.8"

services:
  selenium-hub:
    image: selenium/hub:4.18.1
    container_name: selenium-hub
    ports:
      - "4442:4442"
      - "4443:4443"
      - "4444:4444"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4444/wd/hub/status"]
      interval: 10s
      timeout: 5s
      retries: 5

  chrome-node:
    image: selenium/node-chrome:4.18.1
    container_name: chrome-node
    shm_size: "2gb"
    depends_on:
      selenium-hub:
        condition: service_healthy
    environment:
      - SE_EVENT_BUS_HOST=selenium-hub
      - SE_EVENT_BUS_PUBLISH_PORT=4442
      - SE_EVENT_BUS_SUBSCRIBE_PORT=4443
      - SE_NODE_MAX_SESSIONS=4
      - SE_NODE_OVERRIDE_MAX_SESSIONS=true

  tests:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: qa-tests
    depends_on:
      selenium-hub:
        condition: service_healthy
    environment:
      - SELENIUM_HUB=http://selenium-hub:4444/wd/hub
      - BASE_URL=${BASE_URL:-https://www.example.com}
      - API_BASE_URL=${API_BASE_URL:-https://jsonplaceholder.typicode.com}
    volumes:
      - ./target/allure-results:/app/target/allure-results
      - ./target/surefire-reports:/app/target/surefire-reports
